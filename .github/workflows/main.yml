name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (static, GitHub Pages preset)
        run: bun run build  # 🌟 FIXED: Changed from build:pages to build
        env:
          GITHUB_PAGES: 'true'
          # Nitro config tip: force the github-pages static preset explicitly
          NITRO_PRESET: github-pages 
          
      - name: Ensure .nojekyll
        run: |
          mkdir -p .output/public
          touch .output/public/.nojekyll
          
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # TanStack Start + nitro github_pages preset prerenders into .output/public
          path: './.output/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
